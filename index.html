<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0c; --elev:#181818; --elev2:#212121; --elev3:#2a2a2a;
    --line:#2a2a2a; --line2:#333; --txt:#fff; --muted:#b3b3b3; --faint:#7a7a7a;
    --green:#1ed760; --green-dim:#1db954; --neg:#f15e6c;
    --c1:#509bf5; --c2:#1ed760; --c3:#ffce53; --c4:#af6ee6; --c5:#ff6437; --c6:#f037a5;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  input[type=number]{-moz-appearance:textfield; appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  body{font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--txt); line-height:1.45; min-height:100vh; padding:26px 16px 120px; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  .wrap{max-width:840px; margin:0 auto;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

  header{display:flex; align-items:center; gap:13px; margin-bottom:18px;}
  .logo{width:42px; height:42px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; flex:none;}
  .logo svg{width:24px; height:24px;}
  h1{font-size:30px; font-weight:800; letter-spacing:-.03em;}
  .sub{color:var(--muted); font-size:13px; font-weight:500; margin-top:1px;}

  .month-pill{display:flex; align-items:center; gap:12px; background:var(--elev); border-radius:30px; padding:8px 10px 8px 18px; margin-bottom:16px; width:fit-content;}
  .month-pill .cal{width:7px; height:7px; border-radius:50%; background:var(--green);}
  .month-pill b{font-size:14px; font-weight:800;}
  .month-pill .tag{font-size:11px; font-weight:600; color:var(--faint);}
  .to-current{background:var(--elev3); border:none; color:var(--green); font-family:inherit; font-weight:700; font-size:12px; padding:7px 14px; border-radius:20px; cursor:pointer;}
  .to-current:hover{background:#333;}

  .salary-card{background:var(--elev); border-radius:16px; padding:20px 22px; display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:18px;}
  .k{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:9px;}
  .sal-in{display:flex; align-items:baseline; gap:9px;}
  .cur-prefix{font-size:18px; color:var(--faint); font-weight:700;}
  input#salary{background:transparent; border:none; color:var(--txt); font-size:42px; font-weight:800; width:min(260px,58vw); outline:none; letter-spacing:-.03em; border-bottom:2px solid var(--elev3); padding-bottom:2px;}
  input#salary:focus{border-bottom-color:var(--green);}
  select#cur{background:var(--elev2); border:1px solid var(--line2); color:var(--txt); font-family:inherit; font-weight:600; font-size:13px; padding:11px 14px; border-radius:24px; outline:none; cursor:pointer;}
  select#cur:focus{border-color:var(--green);}

  .overview{display:grid; grid-template-columns:auto 1fr; gap:22px; align-items:center; background:linear-gradient(135deg,#1c2a20,var(--elev)); border-radius:16px; padding:24px; margin-bottom:18px;}
  @media (max-width:560px){.overview{grid-template-columns:1fr; justify-items:center; text-align:center;}}
  .donut-wrap{position:relative; width:180px; height:180px;}
  .donut-wrap svg{transform:rotate(-90deg);}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .donut-pct{font-size:38px; font-weight:800; letter-spacing:-.03em; line-height:1;}
  .donut-lbl{font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-top:5px;}
  .stats{display:flex; flex-direction:column; gap:18px; width:100%;}
  .stat .sk{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:4px;}
  .stat .sv{font-size:26px; font-weight:800; letter-spacing:-.02em;}
  .stat.big .sv{font-size:34px;}
  .left-val.pos{color:var(--green);} .left-val.neg{color:var(--neg);}
  .legend{display:flex; flex-wrap:wrap; gap:7px 14px; margin-top:4px;}
  .leg{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--muted);}
  .leg b{color:var(--txt); font-weight:700;} .leg .d{width:9px; height:9px; border-radius:50%;}

  .sec{font-size:13px; font-weight:800; margin:26px 4px 13px; display:flex; align-items:center; gap:9px;}
  .sec .bar-i{width:4px; height:16px; border-radius:3px; background:var(--green);}

  .cat{background:var(--elev); border-radius:14px; margin-bottom:12px; overflow:hidden; transition:background .15s;}
  .cat:hover{background:#1c1c1c;}
  .cat-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:16px 18px 12px;}
  .cat-name{display:flex; align-items:center; gap:11px; flex:1; min-width:0;}
  .swatch{width:13px; height:13px; border-radius:50%; flex:none; cursor:pointer; border:2px solid transparent; transition:.15s;}
  .swatch:hover{transform:scale(1.25); border-color:#fff3;}
  .cat-name-edit{background:transparent; border:none; color:var(--txt); font-weight:700; font-size:16px; outline:none; padding:2px 0; border-bottom:1px solid transparent; width:100%; max-width:210px;}
  .cat-name-edit:focus{border-bottom-color:var(--line2);}
  .cat-meta{text-align:right; flex:none;}
  .cat-total{font-size:19px; font-weight:800; letter-spacing:-.02em;}
  .cat-count{font-size:11px; font-weight:500; color:var(--faint); margin-top:1px;}
  .trash{background:none; border:none; color:var(--faint); cursor:pointer; padding:7px; border-radius:8px; flex:none; display:flex; transition:.15s;}
  .trash:hover{color:var(--neg); background:var(--elev2);}
  .trash svg{width:16px; height:16px;}
  .rows{padding:0 18px;}
  .row{display:flex; gap:10px; align-items:center; padding:9px 0; border-top:1px solid var(--line);}
  .row .nm{flex:1; min-width:0;}
  .row input{background:transparent; border:none; color:var(--txt); font-family:inherit; font-size:14.5px; font-weight:500; outline:none; padding:7px 2px;}
  .row input::placeholder{color:var(--faint); font-weight:500;}
  .price-cell{display:flex; align-items:center; gap:5px; background:var(--elev2); border:1px solid transparent; border-radius:20px; padding:0 13px;}
  .price-cell:focus-within{border-color:var(--green);}
  .price-cell .csym{font-size:12px; color:var(--faint); font-weight:600;}
  .row .pr{width:88px; text-align:right; font-weight:700; padding:8px 0;}
  .del{background:none; border:none; color:var(--faint); cursor:pointer; font-size:18px; padding:6px 9px; border-radius:50%; line-height:1; flex:none; transition:.15s;}
  .del:hover{color:var(--neg); background:var(--elev2);}
  .add{margin:6px 18px 16px; background:transparent; border:none; color:var(--green); font-family:inherit; font-weight:700; font-size:13px; padding:8px 0; cursor:pointer;}
  .add:hover{color:var(--green-dim);}
  .addcat{margin-top:4px; background:transparent; border:1px solid var(--line2); color:var(--txt); font-family:inherit; font-weight:700; padding:14px; border-radius:24px; width:100%; cursor:pointer; font-size:13px; transition:.15s;}
  .addcat:hover{border-color:var(--green); color:var(--green);}

  .month-card{background:var(--elev); border-radius:16px; padding:22px 24px 18px; margin-top:14px;}
  .month-top{margin-bottom:18px;}
  .month-top h3{font-size:16px; font-weight:800;}
  .month-top p{font-size:12px; color:var(--muted); font-weight:500; margin-top:2px;}
  .chart{display:flex; align-items:flex-end; gap:10px; padding-top:4px;}
  .mbar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; min-width:0; cursor:pointer;}
  .mbar-val{font-size:10px; font-weight:700; color:var(--muted); white-space:nowrap; height:13px;}
  .mtrack{height:120px; width:100%; display:flex; align-items:flex-end; justify-content:center;}
  .mbar{width:100%; max-width:32px; border-radius:6px 6px 3px 3px; background:var(--elev3); transition:height .4s cubic-bezier(.4,0,.2,1), background .15s; min-height:4px;}
  .mbar.cur{background:var(--green);}
  .mbar.sel{box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--green);}
  .mbar-col:hover .mbar{background:var(--green-dim);}
  .mlbl{font-size:11px; font-weight:600; color:var(--faint);}
  .mbar-col.iscur .mlbl{color:var(--green);}
  .mbar-col.issel .mlbl{color:#fff;}

  @media (max-width:520px){h1{font-size:24px;} input#salary{font-size:34px;} .stat.big .sv{font-size:28px;} .row .pr{width:72px;} .chart{gap:5px;}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke="#000" stroke-width="2.4" stroke-linecap="round"/></svg></div>
    <div><h1>Your Budget</h1><div class="sub">Plan it. Track it. Watch it grow.</div></div>
  </header>

  <div class="month-pill">
    <span class="cal"></span>
    <b id="pillName">—</b><span class="tag" id="pillTag">this month</span>
    <button class="to-current" id="toCurrent" style="display:none">← This month</button>
  </div>

  <div class="salary-card">
    <div><div class="k">Monthly salary</div>
      <div class="sal-in"><span class="cur-prefix" id="curPrefix">MAD</span>
        <input id="salary" type="number" inputmode="decimal" value="5000" min="0"></div></div>
    <div><div class="k">Currency</div>
      <select id="cur"><option value="MAD" selected>MAD — Dirham</option><option value="USD">USD — Dollar</option><option value="EUR">EUR — Euro</option><option value="GBP">GBP — Pound</option></select></div>
  </div>

  <div class="overview">
    <div class="donut-wrap">
      <svg viewBox="0 0 180 180" width="180" height="180"><circle cx="90" cy="90" r="74" fill="none" stroke="#2a2a2a" stroke-width="14"/><g id="donutSegs"></g></svg>
      <div class="donut-center"><div class="donut-pct num" id="donutPct">0%</div><div class="donut-lbl">spent</div></div>
    </div>
    <div class="stats">
      <div class="stat big"><div class="sk">Left to save</div><div class="sv num left-val pos" id="leftVal">—</div></div>
      <div class="stat"><div class="sk">Total spent</div><div class="sv num" id="totalSpent" style="font-size:22px">—</div><div class="legend" id="legend"></div></div>
    </div>
  </div>

  <div class="sec"><span class="bar-i"></span>Allocations</div>
  <div id="catList"></div>
  <button class="addcat" id="addCat">+ Add category</button>

  <div class="month-card">
    <div class="month-top"><h3>Spending by month</h3><p>New months start on their own. Tap any bar to view &amp; edit that month.</p></div>
    <div class="chart" id="chart"></div>
  </div>
</div>

<script>
  const palette=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)'];
  const symbols={MAD:'MAD',USD:'$',EUR:'€',GBP:'£'};
  const MK='budget_v6';
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let colorIdx=3, selectedKey, currency='MAD';
  let months={};   // { 'YYYY-MM': { salary, cats:[{name,color,items:[{n,p}]}] } }

  function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
  function curKey(){return key(new Date());}
  function lbl(k){return monthNames[parseInt(k.split('-')[1],10)-1];}
  function fullLbl(k){const[y,m]=k.split('-'); return monthNames[parseInt(m,10)-1]+' '+y;}
  function clone(o){return JSON.parse(JSON.stringify(o));}

  function freshCats(){
    return [
      {name:'Subscriptions',color:'var(--c1)',items:[{n:'Netflix',p:50},{n:'Spotify',p:30}]},
      {name:'Food',color:'var(--c2)',items:[{n:'Groceries',p:1200},{n:'Eating out',p:400}]},
      {name:'Clothes',color:'var(--c3)',items:[{n:'',p:''}]},
    ];
  }

  function load(){
    try{const r=localStorage.getItem(MK); if(r){const d=JSON.parse(r); months=d.months||{}; currency=d.currency||'MAD'; colorIdx=d.colorIdx||3;}}catch(e){}
    ensureCurrentMonth();
    selectedKey=curKey();
  }
  function save(){try{localStorage.setItem(MK,JSON.stringify({months,currency,colorIdx}));}catch(e){}}

  // auto-create the current calendar month, carrying over last month's plan
  function ensureCurrentMonth(){
    const ck=curKey();
    if(months[ck])return;
    const prior=Object.keys(months).filter(k=>k<ck).sort();
    if(prior.length){const last=months[prior[prior.length-1]]; months[ck]={salary:last.salary,cats:clone(last.cats)};}
    else{months[ck]={salary:5000,cats:freshCats()};}
    save();
  }

  const salaryEl=document.getElementById('salary'), curEl=document.getElementById('cur');
  const curPrefix=document.getElementById('curPrefix'), catList=document.getElementById('catList');

  function M(){return months[selectedKey];}
  function fmt(n){const sym=symbols[currency]; const num=(Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2}); return currency==='MAD'?num+' MAD':sym+num;}
  function fmtShort(n){return n>=1000?(n/1000).toFixed(n%1000===0?0:1)+'k':Math.round(n);}
  function esc(s){return String(s).replace(/"/g,'&quot;');}
  function totalOf(c){return c.items.reduce((s,it)=>s+(parseFloat(it.p)||0),0);}
  function grandTotal(){return M().cats.reduce((s,c)=>s+totalOf(c),0);}
  function monthTotal(k){return months[k].cats.reduce((s,c)=>s+totalOf(c),0);}

  function updatePill(){
    const ck=curKey(), isCur=selectedKey===ck;
    document.getElementById('pillName').textContent=fullLbl(selectedKey);
    document.getElementById('pillTag').textContent=isCur?'this month':'editing past month';
    document.getElementById('toCurrent').style.display=isCur?'none':'block';
  }

  function build(){
    catList.innerHTML='';
    salaryEl.value=M().salary; curEl.value=currency;
    updatePill();
    const sym=symbols[currency];
    M().cats.forEach((cat,ci)=>{
      const total=totalOf(cat), count=cat.items.filter(it=>it.n||it.p!=='').length;
      const el=document.createElement('div'); el.className='cat';
      el.innerHTML=`
        <div class="cat-head">
          <div class="cat-name"><span class="swatch" style="background:${cat.color}" data-sw="${ci}" title="Change color"></span>
            <input class="cat-name-edit" value="${esc(cat.name)}" data-cat="${ci}"></div>
          <div class="cat-meta"><div class="cat-total num" data-tot="${ci}">${fmt(total)}</div>
            <div class="cat-count" data-cnt="${ci}">${count} item${count===1?'':'s'}</div></div>
          <button class="trash" data-delcat="${ci}" title="Delete category"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M10 11v6M14 11v6"/></svg></button>
        </div>
        <div class="rows" data-rows="${ci}"></div>
        <button class="add" data-add="${ci}">+ Add item</button>`;
      const rows=el.querySelector(`[data-rows="${ci}"]`);
      cat.items.forEach((it,ii)=>{
        const r=document.createElement('div'); r.className='row';
        r.innerHTML=`<input class="nm" placeholder="Item name" value="${esc(it.n||'')}" data-n="${ci}-${ii}">
          <div class="price-cell"><span class="csym">${sym}</span><input class="pr num" type="number" inputmode="decimal" placeholder="0" value="${it.p}" data-p="${ci}-${ii}"></div>
          <button class="del" data-del="${ci}-${ii}" title="Remove">×</button>`;
        rows.appendChild(r);
      });
      catList.appendChild(el);
    });
    summarize();
  }

  function summarize(){
    curPrefix.textContent=symbols[currency];
    const total=grandTotal(), left=M().salary-total;
    document.getElementById('totalSpent').textContent=fmt(total);
    const lv=document.getElementById('leftVal'); lv.textContent=fmt(left); lv.className='sv num left-val '+(left>=0?'pos':'neg');

    const segs=document.getElementById('donutSegs'); segs.innerHTML='';
    const R=74,C=2*Math.PI*R,base=M().salary>0?M().salary:(total||1); let off=0;
    M().cats.forEach(cat=>{const t=totalOf(cat); if(t<=0)return; const len=C*Math.min(1,t/base);
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',90);c.setAttribute('cy',90);c.setAttribute('r',R);c.setAttribute('fill','none');
      c.setAttribute('stroke',cat.color);c.setAttribute('stroke-width',14);
      c.setAttribute('stroke-dasharray',`${len} ${C-len}`);c.setAttribute('stroke-dashoffset',-off);
      segs.appendChild(c); off+=len;});
    const pct=M().salary>0?Math.round(total/M().salary*100):0;
    const pe=document.getElementById('donutPct'); pe.textContent=pct+'%'; pe.style.color=pct>100?'var(--neg)':'#fff';

    const lg=document.getElementById('legend'); lg.innerHTML='';
    M().cats.forEach(cat=>{const t=totalOf(cat); if(t<=0)return; const s=document.createElement('span'); s.className='leg';
      s.innerHTML=`<span class="d" style="background:${cat.color}"></span>${esc(cat.name)} <b>${fmt(t)}</b>`; lg.appendChild(s);});

    renderChart(); save();
  }

  function renderChart(){
    const chart=document.getElementById('chart'); chart.innerHTML='';
    const ck=curKey();
    const keys=Object.keys(months).sort().slice(-8);
    const max=Math.max(...keys.map(monthTotal),1);
    keys.forEach(k=>{const v=monthTotal(k), isCur=k===ck, isSel=k===selectedKey, h=Math.max(4,Math.round(v/max*120));
      const col=document.createElement('div'); col.className='mbar-col'+(isCur?' iscur':'')+(isSel?' issel':''); col.dataset.month=k;
      col.innerHTML=`<div class="mbar-val">${v>0?fmtShort(v):''}</div>
        <div class="mtrack"><div class="mbar ${isCur?'cur':''} ${isSel?'sel':''}" style="height:${h}px"></div></div>
        <div class="mlbl">${lbl(k)}</div>`;
      chart.appendChild(col);});
  }

  // ---- events (all operate on the selected month) ----
  catList.addEventListener('input',e=>{
    const t=e.target;
    if(t.dataset.n!==undefined){const[c,i]=t.dataset.n.split('-'); M().cats[c].items[i].n=t.value;
      const cnt=M().cats[c].items.filter(it=>it.n||it.p!=='').length; const ce=document.querySelector(`[data-cnt="${c}"]`); if(ce)ce.textContent=cnt+' item'+(cnt===1?'':'s'); save();}
    else if(t.dataset.p!==undefined){const[c,i]=t.dataset.p.split('-'); M().cats[c].items[i].p=t.value;
      const te=document.querySelector(`[data-tot="${c}"]`); if(te)te.textContent=fmt(totalOf(M().cats[c])); summarize();}
    else if(t.dataset.cat!==undefined){M().cats[t.dataset.cat].name=t.value; summarize();}
  });
  catList.addEventListener('click',e=>{
    const t=e.target.closest('[data-add],[data-del],[data-delcat],[data-sw]'); if(!t)return;
    if(t.dataset.add!==undefined){M().cats[t.dataset.add].items.push({n:'',p:''}); build();}
    else if(t.dataset.del!==undefined){const[c,i]=t.dataset.del.split('-'); M().cats[c].items.splice(i,1); if(M().cats[c].items.length===0)M().cats[c].items.push({n:'',p:''}); build();}
    else if(t.dataset.delcat!==undefined){M().cats.splice(t.dataset.delcat,1); build();}
    else if(t.dataset.sw!==undefined){const c=M().cats[t.dataset.sw]; const i=palette.indexOf(c.color); c.color=palette[(i+1)%palette.length]; build();}
  });
  document.getElementById('addCat').addEventListener('click',()=>{M().cats.push({name:'New category',color:palette[colorIdx++%palette.length],items:[{n:'',p:''}]}); build();});
  document.getElementById('chart').addEventListener('click',e=>{const col=e.target.closest('.mbar-col'); if(col){selectedKey=col.dataset.month; build(); window.scrollTo({top:0,behavior:'smooth'});}});
  document.getElementById('toCurrent').addEventListener('click',()=>{selectedKey=curKey(); build(); window.scrollTo({top:0,behavior:'smooth'});});
  salaryEl.addEventListener('input',()=>{M().salary=Math.max(0,parseFloat(salaryEl.value)||0); summarize();});
  curEl.addEventListener('change',()=>{currency=curEl.value; build();});

  load(); build();
</script>
</body>
</html>
